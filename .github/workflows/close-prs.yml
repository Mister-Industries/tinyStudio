name: Close external pull requests

# tinyStudio is in early alpha and not accepting outside contributions yet.
# This auto-closes pull requests from non-collaborators (e.g. drive-by / AI PRs)
# with a polite note. PRs opened by the owner or repo collaborators are left open.
# Delete this workflow when you're ready to accept contributions.

on:
  pull_request_target:
    types: [opened, reopened]

permissions:
  pull-requests: write

jobs:
  close:
    if: >
      github.event.pull_request.author_association != 'OWNER' &&
      github.event.pull_request.author_association != 'MEMBER' &&
      github.event.pull_request.author_association != 'COLLABORATOR'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                'Thanks for your interest in **tinyStudio**! 🙏',
                '',
                'This project is in early alpha and is **not accepting external contributions** right now,',
                'so this pull request is being closed automatically. Please feel free to fork and experiment.',
                '',
                'Contributions will open up as the project stabilizes.'
              ].join('\n')
            })
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              state: 'closed'
            })
