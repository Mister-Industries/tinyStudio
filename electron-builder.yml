appId: com.electron.app
productName: tinyStudio
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
# asar is disabled because the main process loads tinyService via a dynamic ESM
# import(). Electron's require() shim can read inside app.asar, but its ESM loader
# cannot — so an ESM dependency must live on the real filesystem to be importable.
# Keeping the app unpacked is the simplest reliable fix (same files, just not
# archived). Revisit post-alpha if we move tinyService to a spawned sidecar.
asar: false
extraResources:
  # arduino-cli binaries are fetched into vendor/ by scripts/fetch-arduino-cli.mjs
  # (run automatically via the "prebuild" npm hook).
  - from: vendor/arduino-cli/macos-x64/arduino-cli
    to: arduino-cli/darwin-x64/arduino-cli
    filter:
      - '**/*'
  - from: vendor/arduino-cli/macos-arm64/arduino-cli
    to: arduino-cli/darwin-arm64/arduino-cli
    filter:
      - '**/*'
  - from: vendor/arduino-cli/linux-x64/arduino-cli
    to: arduino-cli/linux-x64/arduino-cli
    filter:
      - '**/*'
  - from: vendor/arduino-cli/linux-arm64/arduino-cli
    to: arduino-cli/linux-arm64/arduino-cli
    filter:
      - '**/*'
  - from: vendor/arduino-cli/windows-x64/arduino-cli.exe
    to: arduino-cli/win32-x64/arduino-cli.exe
    filter:
      - '**/*'
  # arduino-language-server + clangd (optional; fetched by
  # scripts/fetch-language-server.mjs). Powers editor code intelligence via
  # tinyService's /lsp bridge; the app degrades gracefully when absent.
  - from: vendor/language-server
    to: language-server
    filter:
      - '**/*'
win:
  executableName: tinystudio
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  target:
    - AppImage
    - snap
    - deb
  maintainer: electronjs.org
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
publish:
  provider: generic
  url: https://example.com/auto-updates
electronDownload:
  mirror: https://npmmirror.com/mirrors/electron/
